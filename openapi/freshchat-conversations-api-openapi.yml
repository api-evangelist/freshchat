openapi: 3.1.0
info:
  title: Freshchat REST Accounts Conversations API
  version: v2
  description: 'Best-effort OpenAPI 3.1 description of the Freshchat REST API v2 for managing

    agents, users, conversations, messages, channels, groups, and roles.

    Generated from public documentation; not an official spec.

    '
  contact:
    name: Freshchat Developer Portal
    url: https://developers.freshchat.com/api/
servers:
- url: https://{account}.freshchat.com/v2
  description: Account-scoped base URL
  variables:
    account:
      default: api
      description: Account subdomain
security:
- bearerAuth: []
tags:
- name: Conversations
paths:
  /conversations:
    post:
      tags:
      - Conversations
      operationId: createConversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Object'
      responses:
        '201':
          $ref: '#/components/responses/Ok'
  /conversations/{conversation_id}:
    parameters:
    - $ref: '#/components/parameters/ConversationId'
    get:
      tags:
      - Conversations
      operationId: getConversation
      responses:
        '200':
          $ref: '#/components/responses/Ok'
    put:
      tags:
      - Conversations
      operationId: updateConversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Object'
      responses:
        '200':
          $ref: '#/components/responses/Ok'
  /conversations/fields:
    get:
      tags:
      - Conversations
      operationId: listConversationFields
      responses:
        '200':
          $ref: '#/components/responses/Ok'
components:
  schemas:
    Object:
      type: object
      additionalProperties: true
  parameters:
    ConversationId:
      in: path
      name: conversation_id
      required: true
      schema:
        type: string
  responses:
    Ok:
      description: Successful response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Object'
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Bearer API token generated in the Freshchat admin console.
