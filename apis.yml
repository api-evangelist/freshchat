aid: freshchat
name: Freshchat
description: >-
  Freshchat is Freshworks' modern messaging and customer engagement platform
  that enables sales and support teams to converse with customers across web,
  mobile, WhatsApp, Facebook Messenger, Instagram, Apple Business Chat, and
  email. The Freshchat REST API provides programmatic access to agents, users,
  conversations, messages, channels, bots, and reports for building custom
  integrations and workflow automations. Authentication uses Bearer API tokens
  generated from the Freshchat admin console.
