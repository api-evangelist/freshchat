apis:
  - aid: freshchat:rest-api
    name: Freshchat REST API
    description: >-
      REST API for managing agents, users, conversations, messages, channels,
      groups, roles, and reports in Freshchat. Each account has a unique base
      URL of the form https://<account-name>.freshchat.com/v2/. Authentication
      uses Bearer API tokens generated by an admin in the Freshchat admin
      console.
    humanURL: https://developers.freshchat.com/api/
    baseURL: https://api.freshchat.com/v2
